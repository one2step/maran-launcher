name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow windnd pystray

      - name: Generate icon
        run: python make_icon.py

      - name: Build exe
        run: |
          python -m PyInstaller --noconfirm --onefile --noconsole --clean --icon icon.ico --name maran-launcher --hidden-import windnd --hidden-import PIL.ImageGrab --hidden-import PIL.ImageDraw --hidden-import PIL.ImageTk --hidden-import PIL.Image --hidden-import pystray --hidden-import pystray._win32 maran_launcher.py

      - name: Prepare assets
        run: |
          Copy-Item install.ps1 dist/i.ps1
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/maran-launcher.exe
            install.ps1
            dist/i.ps1
          generate_release_notes: true
